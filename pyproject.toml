[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "plaud-tools"
version = "0.1.2"
description = "Python rewrite for Plaud CLI and MCP workflows."
requires-python = ">=3.11"
dependencies = [
    "keyring>=25,<26",
    "mcp>=1.0,<2.0",
]

[project.scripts]
plaud = "plaud_tools.cli:main"
pld = "plaud_tools.cli:main"
plaud-mcp = "plaud_tools.server:main"
plaud-tray = "plaud_tools.tray_app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["plaud_tools*"]

[project.optional-dependencies]
dev = ["pytest>=8", "pyinstaller>=6"]
tray = ["pystray>=0.19", "Pillow>=10"]

[tool.pytest.ini_options]
testpaths = ["tests"]
