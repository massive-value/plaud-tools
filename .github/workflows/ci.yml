name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets release.yml gate the release build+publish path on this entire
  # check suite by calling this workflow as a reusable workflow
  # (`uses: ./.github/workflows/ci.yml`).
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ffmpeg-pin:
    uses: ./.github/workflows/ffmpeg-pin.yml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: python -m ruff check .

      - name: Format check (ruff format)
        run: python -m ruff format --check .

      - name: Install mypy and package stubs
        # Install mypy plus the project itself (needed so mypy can resolve
        # intra-package imports).  mcp and platformdirs ship py.typed markers
        # so their types resolve automatically; pystray/comtypes/winrt do not
        # (ignore_missing_imports = true covers them).
        run: pip install mypy ".[dev]"

      - name: Type check (mypy)
        # Run against the source tree rather than the installed package so
        # edits on the branch are checked without a reinstall.  Exit 0 is the
        # only acceptable outcome — any error fails the lint job.
        run: python -m mypy src/plaud_tools

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Windows also pulls in the [tray] extra so the tray/tk/pystray
        # import surface is exercised by the unit test suite itself, not
        # only by the separate bundle-smoke job.
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pip install -e ".[tray,dev]"
          else
            pip install -e ".[dev]"
          fi

      - name: Run tests
        run: pytest -q

      # Coverage is informational only (§5.5): no --cov-fail-under, so a drop
      # never fails CI. Runs on a single leg to avoid 9x redundant reports;
      # ubuntu-latest/3.12 is arbitrary but stable so the artifact name below
      # never collides across re-runs of the same matrix.
      - name: Coverage report (non-gating)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pytest -q --cov=plaud_tools --cov-report=term-missing --cov-report=html
        continue-on-error: true

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
          if-no-files-found: warn

  # PS 5.1 parse gate — both shipped updater regressions (v0.3.4, v0.4.1)
  # were Windows PowerShell 5.1 execution failures that a PowerShell-Core-only
  # check would not have caught.  `windows-latest` ships Windows PowerShell
  # 5.1 as `powershell.exe` (the `powershell` shell keyword below), distinct
  # from PowerShell 7+ (`pwsh`).  This parses both scripts with the real 5.1
  # parser and fails on any parse error.
  #
  # TODO(Wave 3): this is a parse-only gate. A fuller frozen old-version ->
  # new-version updater simulation job (actually running update.ps1 under
  # 5.1 against a fake install tree) is tracked as a follow-up — see
  # docs/plans/2026-07-06-full-audit-and-remediation-plan.md §4 item 3.
  ps51-parse-gate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse update.ps1 / install.ps1 under Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            'src/plaud_tools/scripts/update.ps1',
            'scripts/install.ps1'
          )
          $failed = $false
          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              Write-Host "PS 5.1 parse errors in ${file}:"
              foreach ($e in $parseErrors) { Write-Host " - $($e.Message)" }
              $failed = $true
            } else {
              Write-Host "OK: $file parses cleanly under Windows PowerShell 5.1"
            }
          }
          if ($failed) {
            Write-Error "One or more scripts fail to parse under Windows PowerShell 5.1."
            exit 1
          }

  # bundle-smoke is Windows-only for now because the PyInstaller bundle targets
  # Win32 PE executables.  macOS and Linux bundle jobs will be added as separate
  # sibling jobs here once macOS/Linux bundle support is implemented (B4 scope).
  bundle-smoke:
    needs: ffmpeg-pin
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        # -c pins every transitive dep to the audited windows constraint file,
        # matching what release.yml ships (Wave 0 / CI-CD 5) — the CI smoke
        # bundle is no longer built from floating deps while release pins.
        run: pip install -c constraints/windows.txt ".[tray,dev]"

      - name: Generate Windows PE version info
        run: python pyinstaller/version_info.py

      - name: Build plaud-mcp
        run: pyinstaller pyinstaller/plaud-mcp.spec --distpath out/plaud-mcp --noconfirm

      - name: Build plaud CLI
        run: pyinstaller pyinstaller/plaud.spec --distpath out/plaud-cli --noconfirm

      - name: Smoke test MCP executable
        run: out\plaud-mcp\plaud-mcp\plaud-mcp.exe --version

      - name: Smoke test CLI executable
        run: out\plaud-cli\plaud-tools\plaud-tools.exe --version

      - name: Download ffmpeg (pinned)
        run: |
          # See .github/workflows/ffmpeg-pin.yml for the single-sourced pin
          # (URL + SHA-256) shared with release.yml.
          $ffmpegUrl = "${{ needs.ffmpeg-pin.outputs.url }}"
          $expectedHash = "${{ needs.ffmpeg-pin.outputs.sha256 }}"
          Invoke-WebRequest $ffmpegUrl -OutFile ffmpeg.zip
          $actualHash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "ffmpeg SHA-256 mismatch! expected=$expectedHash actual=$actualHash"
            exit 1
          }
          Write-Host "ffmpeg SHA-256 verified: $actualHash"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $exe = Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffmpegDir = $exe.DirectoryName
          Write-Host "ffmpeg located at: $($exe.FullName)"
          # Add ffmpeg's directory to PATH for subsequent steps.
          echo "$ffmpegDir" >> $env:GITHUB_PATH

      - name: Run ffmpeg transcode smoke
        run: python scripts/ffmpeg_smoke.py

      # Wave 2 / C4 — frozen psutil import proof.
      #
      # Build the tray bundle and run PlaudTools.exe --diagnose-enum.  This flag
      # imports plaud_tools.mcp_lifecycle (exercising all hiddenimports) and
      # prints "enumerator=psutil" when psutil is bundled correctly, then exits 0
      # WITHOUT starting the tkinter/pystray GUI (critical: no display on CI).
      #
      # If psutil's C extensions are missing from the bundle the import fails and
      # the flag prints "enumerator=powershell_fallback", causing this step to
      # fail the assertion and block the merge.
      - name: Build tray bundle (psutil proof)
        run: pyinstaller pyinstaller/plaud-tray.spec --distpath out/plaud-tray --noconfirm

      - name: Frozen psutil import proof (--diagnose-enum)
        shell: pwsh
        run: |
          $output = & "out\plaud-tray\PlaudTools\PlaudTools.exe" --diagnose-enum
          Write-Host "diagnose-enum output: $output"
          if ($output -notmatch "enumerator=psutil") {
            Write-Error "[BUNDLE-GATE] psutil is NOT the active enumerator in the frozen build. Output: $output"
            exit 1
          }
          Write-Host "[BUNDLE-GATE] psutil confirmed as active enumerator in frozen build."

  # Wave 2 / C3: verify that each platform's constraint file is installable.
  # This job is intentionally separate from the existing test/lint/bundle-smoke
  # jobs so concurrent agents can own those job definitions independently.
  constraints-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            constraints: constraints/windows.txt
            extras: ".[tray,dev]"
          - os: ubuntu-latest
            constraints: constraints/linux.txt
            extras: ".[dev]"
          - os: macos-latest
            constraints: constraints/macos.txt
            extras: ".[dev]"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Verify constraint file installs cleanly
        # -c enforces the pinned constraint file; any version conflict or missing
        # wheel causes pip to fail here rather than silently drifting at build time.
        run: pip install -c ${{ matrix.constraints }} ${{ matrix.extras }}
