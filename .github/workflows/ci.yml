name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: python -m ruff check .

      - name: Format check (ruff format)
        run: python -m ruff format --check .

      - name: Install mypy and package stubs
        # Install mypy plus the project itself (needed so mypy can resolve
        # intra-package imports).  mcp and platformdirs ship py.typed markers
        # so their types resolve automatically; pystray/comtypes/winrt do not
        # (ignore_missing_imports = true covers them).
        run: pip install mypy ".[dev]"

      - name: Type check (mypy)
        # Run against the source tree rather than the installed package so
        # edits on the branch are checked without a reinstall.  Exit 0 is the
        # only acceptable outcome — any error fails the lint job.
        run: python -m mypy src/plaud_tools

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  # bundle-smoke is Windows-only for now because the PyInstaller bundle targets
  # Win32 PE executables.  macOS and Linux bundle jobs will be added as separate
  # sibling jobs here once macOS/Linux bundle support is implemented (B4 scope).
  bundle-smoke:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[tray,dev]"

      - name: Generate Windows PE version info
        run: python pyinstaller/version_info.py

      - name: Build plaud-mcp
        run: pyinstaller pyinstaller/plaud-mcp.spec --distpath out/plaud-mcp --noconfirm

      - name: Build plaud CLI
        run: pyinstaller pyinstaller/plaud.spec --distpath out/plaud-cli --noconfirm

      - name: Smoke test MCP executable
        run: out\plaud-mcp\plaud-mcp\plaud-mcp.exe --version

      - name: Smoke test CLI executable
        run: out\plaud-cli\plaud-tools\plaud-tools.exe --version

      - name: Download ffmpeg (pinned)
        run: |
          # Pinned to ffmpeg 8.1.1 (essentials build) — same pin as release.yml.
          # SHA-256 sourced from https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.1.1-essentials_build.zip.sha256
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.1.1-essentials_build.zip"
          $expectedHash = "6F58CE889F59C311410F7D2B18895B33C03456463486F3B1EBC93D97A0F54541"
          Invoke-WebRequest $ffmpegUrl -OutFile ffmpeg.zip
          $actualHash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "ffmpeg SHA-256 mismatch! expected=$expectedHash actual=$actualHash"
            exit 1
          }
          Write-Host "ffmpeg SHA-256 verified: $actualHash"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $exe = Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffmpegDir = $exe.DirectoryName
          Write-Host "ffmpeg located at: $($exe.FullName)"
          # Add ffmpeg's directory to PATH for subsequent steps.
          echo "$ffmpegDir" >> $env:GITHUB_PATH

      - name: Run ffmpeg transcode smoke
        run: python scripts/ffmpeg_smoke.py

      # Wave 2 / C4 — frozen psutil import proof.
      #
      # Build the tray bundle and run PlaudTools.exe --diagnose-enum.  This flag
      # imports plaud_tools.mcp_lifecycle (exercising all hiddenimports) and
      # prints "enumerator=psutil" when psutil is bundled correctly, then exits 0
      # WITHOUT starting the tkinter/pystray GUI (critical: no display on CI).
      #
      # If psutil's C extensions are missing from the bundle the import fails and
      # the flag prints "enumerator=powershell_fallback", causing this step to
      # fail the assertion and block the merge.
      - name: Build tray bundle (psutil proof)
        run: pyinstaller pyinstaller/plaud-tray.spec --distpath out/plaud-tray --noconfirm

      - name: Frozen psutil import proof (--diagnose-enum)
        shell: pwsh
        run: |
          $output = & "out\plaud-tray\PlaudTools\PlaudTools.exe" --diagnose-enum
          Write-Host "diagnose-enum output: $output"
          if ($output -notmatch "enumerator=psutil") {
            Write-Error "[BUNDLE-GATE] psutil is NOT the active enumerator in the frozen build. Output: $output"
            exit 1
          }
          Write-Host "[BUNDLE-GATE] psutil confirmed as active enumerator in frozen build."

  # Wave 2 / C3: verify that each platform's constraint file is installable.
  # This job is intentionally separate from the existing test/lint/bundle-smoke
  # jobs so concurrent agents can own those job definitions independently.
  constraints-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            constraints: constraints/windows.txt
            extras: ".[tray,dev]"
          - os: ubuntu-latest
            constraints: constraints/linux.txt
            extras: ".[dev]"
          - os: macos-latest
            constraints: constraints/macos.txt
            extras: ".[dev]"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Verify constraint file installs cleanly
        # -c enforces the pinned constraint file; any version conflict or missing
        # wheel causes pip to fail here rather than silently drifting at build time.
        run: pip install -c ${{ matrix.constraints }} ${{ matrix.extras }}
