name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  bundle-smoke:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[tray,dev]"

      - name: Generate Windows PE version info
        run: python pyinstaller/version_info.py

      - name: Build plaud-mcp
        run: pyinstaller pyinstaller/plaud-mcp.spec --distpath out/plaud-mcp --noconfirm

      - name: Build plaud CLI
        run: pyinstaller pyinstaller/plaud.spec --distpath out/plaud-cli --noconfirm

      - name: Smoke test MCP executable
        run: out\plaud-mcp\plaud-mcp\plaud-mcp.exe --version

      - name: Smoke test CLI executable
        run: out\plaud-cli\plaud-tools\plaud-tools.exe --version
