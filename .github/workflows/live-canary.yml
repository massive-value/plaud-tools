name: Live Plaud API canary

# Weekly + on-demand run of the opt-in *read-only* live tests
# (tests/test_live_integration.py) against a real, sacrificial Plaud
# account. Plaud API drift is this project's #1 stated risk (see
# CLAUDE.md's "vertical slices + sacrificial live Plaud data" principle);
# this turns "a user reports something broke" into "CI reports Plaud API
# drift" a week earlier, on average.
#
# Deliberately READ-ONLY: only test_live_integration.py runs here (never
# test_upload.py's live-upload test, which requires PLAUD_LIVE_UPLOADS=1 —
# left unset). Do not widen this workflow to cover live write operations.
#
# Requires a repository secret PLAUD_LIVE_SESSION_JSON holding the
# sacrificial account's session.json content (the same shape
# FileSessionStore reads/writes: {"access_token": ..., "region": ...,
# "email": ...}). Until that secret is added this job no-ops cleanly
# (skips the test step with a clear log line) rather than failing —
# secrets are never available to workflow runs triggered from a fork, and
# a fresh clone of this repo has no secret configured yet either.

on:
  workflow_dispatch: {}
  schedule:
    # Weekly, Monday 09:00 UTC — arbitrary but stable so re-runs are easy to
    # correlate across weeks.
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  live-read-canary:
    # Scheduled/dispatch runs on forks would otherwise also attempt this
    # (and always no-op since forks never see the secret) — skip outright
    # so fork Actions tabs don't accumulate a weekly no-op run.
    if: github.repository == 'massive-value/plaud-tools'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Write sacrificial session file from secret
        id: session
        env:
          PLAUD_LIVE_SESSION_JSON: ${{ secrets.PLAUD_LIVE_SESSION_JSON }}
        run: |
          if [ -z "$PLAUD_LIVE_SESSION_JSON" ]; then
            echo "PLAUD_LIVE_SESSION_JSON secret is not set; skipping the live canary."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          session_path="$RUNNER_TEMP/plaud_live_session.json"
          printf '%s' "$PLAUD_LIVE_SESSION_JSON" > "$session_path"
          echo "session_path=$session_path" >> "$GITHUB_OUTPUT"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run live read-only tests
        if: steps.session.outputs.ready == 'true'
        env:
          PLAUD_LIVE_READS: '1'
          PLAUD_SESSION_PATH: ${{ steps.session.outputs.session_path }}
        # Scoped to the read-only live test module by file path (not just the
        # `live` marker + env-var gate) so a future test added to this
        # module under the same marker can't accidentally turn this into a
        # write path without a deliberate change here too.
        run: pytest -q -m live tests/test_live_integration.py
